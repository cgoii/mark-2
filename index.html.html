<script>

const music = document.getElementById("music");
const btn = document.getElementById("musicBtn");

btn.addEventListener("click", function(){

if(music.paused){

music.play();
btn.classList.add("spin");

}else{

music.pause();
btn.classList.remove("spin");

}

});

</script>
